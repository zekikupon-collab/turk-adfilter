# CI: main/develop branch'ine push'ta frontend'i derleyip yayına alır.
# Otomatik filtre commit'leri [skip ci] taşıdığı için siteyi yeniden build etmez.
# Tüm ortam ayrıntıları (yollar, portlar, domainler) sunucudaki deploy betiğindedir.
when:
  - event: [push, manual]
    branch: [main, develop]

steps:
  deploy:
    image: docker:28-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/turk-adfilter:/opt/turk-adfilter
    commands:
      - sh /opt/turk-adfilter/deploy.sh
